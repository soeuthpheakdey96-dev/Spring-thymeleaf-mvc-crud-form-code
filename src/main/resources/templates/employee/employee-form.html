<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <title>Save Employee</title>
</head>

<body class= "p-3 mb-2 bg-danger-subtle text-danger-emphasis">
<div class="container mt-4">

	
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Save Employee</h4>
        </div>
        <div class="card-body">
            <form action="#" th:action="@{/employee/save}" th:object="${employee}" method="POST">
				
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" id="firstName"
                               class="form-control" placeholder="Enter first name">
                        <span th:if="${#fields.hasErrors('firstName')}" 
                        	  th:errors="*{firstName}"
                        	  class="text-danger"></span>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" id="lastName"
                               class="form-control" placeholder="Enter last name">
                        <span th:if="${#fields.hasErrors('lastName')}"
                        	  th:errors="*{lastName}"
                              class="text-danger"></span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" th:field="*{email}" id="email"
                           class="form-control" placeholder="Enter email">
                    <span th:if="${#fields.hasErrors('email')}"
                    	  th:errors="*{email}" 
                          class="text-danger"></span>
                          
                </div>
         			 <div class="mb-3">
   				 <label for="Education" class="form-label">Education</label>
    		<select th:field="*{Education}" id="Education" class="form-control">
        		<option th:each="Edu : ${Educationlist}"
                th:value="${Edu}"
                th:text="${Edu}">
       			 </option>
    			</select>
			</div>
						<input type="hidden" th:field="*{EmployeeId}">
                <div class="d-flex justify-content-between">
                    <a th:href="@{/employee/list-employee}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save"></i> Save
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
